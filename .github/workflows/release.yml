name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -v -o llama-launcher-linux-${{ matrix.goarch }} ./cmd/llama-launcher

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: llama-launcher-linux-${{ matrix.goarch }}
          path: llama-launcher-linux-${{ matrix.goarch }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: llama-launcher-linux-*
          merge-multiple: true
          path: bin

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: bin/llama-launcher-linux-*
          generate_release_notes: true
          draft: false
          prerelease: false
